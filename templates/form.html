<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dark Form</title>

    <style>
        body {
            background-color: #121212;
            font-family: Arial, sans-serif;
            color: #f1f1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background-color: #2c2c2c;
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border: 1px solid #00adb5;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #00adb5;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #019ca3;
        }

        ul {
            margin-top: 20px;
            padding-left: 15px;
        }

        li {
            margin-bottom: 5px;
            font-size: 14px;
        }

        hr {
            border: 0.5px solid #333;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Add Details</h2>

        <form method="POST">
            <label>Name:</label>
            <input type="text" name="name" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <input type="submit" value="Submit">
        </form>

        <hr>

        <h3>Registered Users</h3>
        <ul>
            {% for user in users %}
                <li>{{ user.name }} - {{ user.email }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
